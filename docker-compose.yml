version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vas-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - vas-network
    depends_on:
      - db
      - redis

  web:
    image: nginx:alpine
    container_name: vas-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - vas-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: vas-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: vas_db
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_PASSWORD: dbpassword
      MYSQL_USER: vas_user
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - vas-network

  redis:
    image: redis:alpine
    container_name: vas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - vas-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: vas-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    networks:
      - vas-network
    depends_on:
      - db

networks:
  vas-network:
    driver: bridge

volumes:
  db_data: